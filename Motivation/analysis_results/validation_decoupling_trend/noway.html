<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统三大核心优势 - 纯标题版</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --accent-color: #3182ce;
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 36px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .features-wrapper {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .feature-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px 40px; /* 减小上下边距，使纯标题排版更紧凑 */
            display: flex;
            align-items: center; /* 确保图标和标题垂直居中对齐 */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            border-left: 6px solid transparent;
        }

        .feature-card:hover {
            transform: translateX(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border-left: 6px solid var(--accent-color);
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(49,130,206,0.1) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            transition: transform 0.4s ease;
        }

        .feature-card:hover::before {
            transform: scale(1.5);
        }

        .icon-box {
            flex-shrink: 0;
            width: 70px;
            height: 70px;
            background: #ebf8ff;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin-right: 40px;
            color: var(--accent-color);
            box-shadow: 0 4px 10px rgba(49, 130, 206, 0.15);
        }

        .content-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .feature-title {
            color: var(--primary-color);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .feature-subtitle {
            display: inline-block;
            color: #4a5568;
            font-size: 15px;
            font-weight: 600;
            background: #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            align-self: flex-start;
            margin: 0; /* 移除底部 margin，因为下面没有描述了 */
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>平台核心竞争优势</h1>
    </div>

    <div class="features-wrapper">
        
        <div class="feature-card">
            <div class="icon-box">🏛️</div>
            <div class="content-box">
                <div class="feature-title">高度专业化知识嵌入与专属工作流</div>
                <div class="feature-subtitle">知识图谱 × 审比勘改</div>
            </div>
        </div>

        <div class="feature-card">
            <div class="icon-box">⚖️</div>
            <div class="content-box">
                <div class="feature-title">深度白盒化人机协作机制</div>
                <div class="feature-subtitle">多智能体辩论 × 专家仲裁</div>
            </div>
        </div>

        <div class="feature-card">
            <div class="icon-box">🧬</div>
            <div class="content-box">
                <div class="feature-title">系统知识沉淀与持续自进化</div>
                <div class="feature-subtitle">抽象规则 × 举一反三</div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
